# Esempio ingress Cloudflare Tunnel (se NON usi TUNNEL_TOKEN).
# Monta in /etc/cloudflared/config.yml sul server e collega al container cloudflared esistente.
#
# tunnel: <TUNNEL_ID>
# credentials-file: /etc/cloudflared/<TUNNEL_ID>.json
